  /api/partner/v1/reports:
    get:
      tags:
        - Relatórios
      summary: Métricas do sistema
      description: |-
        Retorna métricas consolidadas do sistema para o período informado.
        Útil para dashboards e visões gerenciais.

        Todos os valores monetários são inteiros em **centavos**.
      operationId: reportsIndex
      parameters:
        - name: date_from
          in: query
          description: Data inicial do período (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
            example: "2026-01-01"
        - name: date_to
          in: query
          description: Data final do período (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
            example: "2026-03-31"
      responses:
        '200':
          description: Métricas retornadas com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: object
                    properties:
                      from:
                        type: string
                        format: date
                        example: "2026-01-01"
                      to:
                        type: string
                        format: date
                        example: "2026-03-31"
                  orders:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 87
                        description: Total de pedidos no período
                      by_status:
                        type: object
                        additionalProperties:
                          type: integer
                        example:
                          a_faturar: 3
                          faturado: 8
                          confirmado: 21
                          em_execucao: 5
                          concluido: 48
                          cancelado: 2
                  services:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 112
                      by_status:
                        type: object
                        additionalProperties:
                          type: integer
                        example:
                          programado: 25
                          confirmado: 18
                          em_execucao: 7
                          concluido: 59
                          nao_executado: 3
                  financials:
                    type: object
                    properties:
                      total_revenue_cents:
                        type: integer
                        example: 34750000
                        description: Receita total em centavos
                      total_margin_cents:
                        type: integer
                        example: 4530000
                        description: Margem total em centavos
                      average_margin_percentage:
                        type: number
                        format: double
                        example: 13.04
                  customers:
                    type: object
                    properties:
                      total_active:
                        type: integer
                        example: 63
                        description: Total de clientes ativos
                      new_in_period:
                        type: integer
                        example: 11
                        description: Novos clientes cadastrados no período
              example:
                period:
                  from: "2026-01-01"
                  to: "2026-03-31"
                orders:
                  total: 87
                  by_status:
                    a_faturar: 3
                    faturado: 8
                    confirmado: 21
                    em_execucao: 5
                    concluido: 48
                    cancelado: 2
                services:
                  total: 112
                  by_status:
                    programado: 25
                    confirmado: 18
                    em_execucao: 7
                    concluido: 59
                    nao_executado: 3
                financials:
                  total_revenue_cents: 34750000
                  total_margin_cents: 4530000
                  average_margin_percentage: 13.04
                customers:
                  total_active: 63
                  new_in_period: 11
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Erro inesperado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  # ─────────────────────────────────────────────
  # CONFIGURAÇÕES
  # ─────────────────────────────────────────────

  /api/partner/v1/settings:
    get:
      tags:
        - Configurações
      summary: Ver configurações
      description: Retorna as configurações atuais da conta parceira.
      operationId: settingsShow
      responses:
        '200':
          description: Configurações retornadas com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      default_margin_percentage:
                        type: number
                        format: double
                        example: 15.0
                        description: Margem percentual padrão aplicada a todos os orçamentos/pedidos
                      company_name:
                        type: string
                        example: "Viagens Corporativas SP Ltda"
                      timezone:
                        type: string
                        example: "America/Sao_Paulo"
                      currency:
                        type: string
                        example: "BRL"
              example:
                data:
                  default_margin_percentage: 15.0
                  company_name: "Viagens Corporativas SP Ltda"
                  timezone: "America/Sao_Paulo"
                  currency: "BRL"
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Erro inesperado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

    put:
      tags:
        - Configurações
      summary: Atualizar configurações
      description: Atualiza as configurações da conta parceira. Apenas os campos enviados serão modificados.
      operationId: settingsUpdate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                default_margin_percentage:
                  type: number
                  format: double
                  example: 18.0
                  minimum: 0
                  maximum: 100
                  description: Nova margem percentual padrão (0 a 100)
            example:
              default_margin_percentage: 18.0
      responses:
        '200':
          description: Configurações atualizadas com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Configurações atualizadas com sucesso"
                  data:
                    type: object
                    properties:
                      default_margin_percentage:
                        type: number
                        format: double
                        example: 18.0
        '422':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Erro inesperado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  # ─────────────────────────────────────────────
  # WEBHOOKS
  # ─────────────────────────────────────────────

  /api/partner/v1/webhooks:
    get:
      tags:
        - Webhooks
      summary: Listar webhooks configurados
      description: |-
        Retorna todos os webhooks registrados na conta parceira.

        **Eventos disponíveis:**
        - `order.created` — Novo pedido criado
        - `order.status_changed` — Status do pedido alterado
        - `service.status_changed` — Status do serviço alterado
        - `service.operational_updated` — Dados operacionais atualizados (motorista, placa, ANTT)
        - `service.passengers_updated` — Lista de passageiros atualizada
        - `quote.created` — Novo orçamento criado
        - `quote.accepted` — Orçamento aceito pelo cliente
        - `quote.rejected` — Orçamento recusado pelo cliente
      operationId: webhooksIndex
      responses:
        '200':
          description: Lista de webhooks retornada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebhookObject'
              example:
                data:
                  - id: 3
                    url: "https://erp.empresa.com.br/webhooks/gds"
                    events:
                      - "order.created"
                      - "order.status_changed"
                      - "service.operational_updated"
                    active: true
                    created_at: "2026-01-10T08:00:00-03:00"
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Erro inesperado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

    post:
      tags:
        - Webhooks
      summary: Registrar webhook
      description: |-
        Registra um novo endpoint de webhook para receber notificações de eventos.

        O CGD enviará um `POST` para a URL configurada com o payload do evento em formato JSON.
        Recomenda-se que o endpoint retorne HTTP 200 em até **5 segundos**; caso contrário,
        o CGD tentará reenviar o evento automaticamente.
      operationId: webhooksStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
                - events
              properties:
                url:
                  type: string
                  format: uri
                  example: "https://erp.empresa.com.br/webhooks/gds"
                  description: URL pública que receberá os eventos via POST
                events:
                  type: array
                  minItems: 1
                  description: Lista de eventos que acionarão este webhook
                  items:
                    type: string
                    enum:
                      - order.created
                      - order.status_changed
                      - service.status_changed
                      - service.operational_updated
                      - service.passengers_updated
                      - quote.created
                      - quote.accepted
                      - quote.rejected
                  example:
                    - "order.created"
                    - "order.status_changed"
                    - "service.operational_updated"
                active:
                  type: boolean
                  example: true
                  default: true
                  description: Se o webhook está ativo. Webhooks inativos não recebem eventos.
                secret:
                  type: string
                  example: "meu_segredo_para_validar_assinatura"
                  description: Chave secreta para validação da assinatura HMAC do payload (opcional, mas recomendado)
            example:
              url: "https://erp.empresa.com.br/webhooks/gds"
              events:
                - "order.created"
                - "order.status_changed"
                - "service.operational_updated"
              active: true
              secret: "meu_segredo_para_validar_assinatura"
      responses:
        '201':
          description: Webhook registrado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Webhook registrado com sucesso"
                  data:
                    $ref: '#/components/schemas/WebhookObject'
        '422':
          description: Dados inválidos ou URL inacessível
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Erro inesperado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /api/partner/v1/webhooks/{id}:
    put:
      tags:
        - Webhooks
      summary: Atualizar webhook
      description: Atualiza a URL, eventos ou status de ativo de um webhook existente.
      operationId: webhooksUpdate
      parameters:
        - name: id
          in: path
          description: ID do webhook
          required: true
          schema:
            type: integer
            format: int64
            example: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                  example: "https://erp.empresa.com.br/webhooks/gds-v2"
                events:
                  type: array
                  items:
                    type: string
                    enum:
                      - order.created
                      - order.status_changed
                      - service.status_changed
                      - service.operational_updated
                      - service.passengers_updated
                      - quote.created
                      - quote.accepted
                      - quote.rejected
                  example:
                    - "order.created"
                    - "service.status_changed"
                active:
                  type: boolean
                  example: false
            example:
              active: false
      responses:
        '200':
          description: Webhook atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Webhook atualizado com sucesso"
                  data:
                    $ref: '#/components/schemas/WebhookObject'
        '404':
          description: Webhook não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Erro inesperado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

    delete:
      tags:
        - Webhooks
      summary: Remover webhook
      description: Remove permanentemente um webhook registrado. Esta ação não pode ser desfeita.
      operationId: webhooksDestroy
      parameters:
        - name: id
          in: path
          description: ID do webhook
          required: true
          schema:
            type: integer
            format: int64
            example: 3
      responses:
        '200':
          description: Webhook removido com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Webhook removido com sucesso"
        '404':
          description: Webhook não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Erro inesperado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

# ─────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token obtido em `POST /api/partner/v1/auth/token`

  schemas:

    CustomerObject:
      type: object
      description: Representa um cliente cadastrado na conta parceira.
      properties:
        id:
          type: integer
          format: int64
          example: 42
          description: Identificador único interno
        uuid:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          description: Identificador único global (UUID v4)
        name:
          type: string
          example: "João da Silva Transportes Ltda"
          description: Nome completo ou razão social
        email:
          type: string
          format: email
          example: "joao@transportes.com.br"
          nullable: true
        phone:
          type: string
          example: "(11) 98765-4321"
          nullable: true
        document:
          type: string
          example: "12.345.678/0001-90"
          nullable: true
          description: CPF (pessoa física) ou CNPJ (pessoa jurídica)
        integration_code:
          type: string
          example: "CLI-00042"
          nullable: true
          description: Código de integração com sistema externo (ERP, CRM, etc.)
        margin_percentage:
          type: number
          format: double
          example: 15.0
          nullable: true
          description: Margem percentual específica deste cliente. Se nulo, usa a margem padrão da conta.
        type:
          type: string
          enum: [individual, company]
          example: "company"
          description: "`individual` = Pessoa Física | `company` = Pessoa Jurídica"
        active:
          type: boolean
          example: true
          description: Indica se o cliente está ativo
        created_at:
          type: string
          format: date-time
          example: "2025-06-15T10:30:00-03:00"

    CustomerInput:
      type: object
      description: Dados para criação ou atualização de um cliente.
      required:
        - name
        - type
      properties:
        name:
          type: string
          example: "Maria Aparecida Souza"
          description: Nome completo ou razão social
        type:
          type: string
          enum: [individual, company]
          example: "individual"
          description: Tipo de pessoa (`individual` = PF, `company` = PJ)
        email:
          type: string
          format: email
          example: "maria.souza@email.com.br"
          nullable: true
        phone:
          type: string
          example: "(21) 99234-5678"
          nullable: true
        document:
          type: string
          example: "123.456.789-00"
          nullable: true
          description: CPF (PF) ou CNPJ (PJ), com ou sem formatação
        integration_code:
          type: string
          example: "ERP-9981"
          nullable: true
          description: Código do cliente no sistema de origem (ERP, CRM, etc.)
        margin_percentage:
          type: number
          format: double
          example: 12.5
          nullable: true
          description: Margem percentual específica (0 a 100). Se omitido, usa o padrão da conta.
        active:
          type: boolean
          example: true
          description: Status do cliente (padrão `true`)
        address_street:
          type: string
          example: "Rua das Flores"
          nullable: true
        address_number:
          type: string
          example: "123"
          nullable: true
        address_complement:
          type: string
          example: "Apto 45"
          nullable: true
        address_district:
          type: string
          example: "Jardim Botânico"
          nullable: true
          description: Bairro
        address_city:
          type: string
          example: "Rio de Janeiro"
          nullable: true
        address_state:
          type: string
          example: "RJ"
          nullable: true
          description: Sigla do estado (UF)
        address_zipcode:
          type: string
          example: "22460-040"
          nullable: true
          description: CEP, com ou sem hífen

    VehicleResult:
      type: object
      description: Veículo disponível retornado pela busca de disponibilidade.
      properties:
        id:
          type: integer
          format: int64
          example: 101
          description: ID do veículo na frota do tenant
        name:
          type: string
          example: "Mercedes-Benz O-500 Executivo"
          description: Nome ou modelo do veículo
        capacity:
          type: integer
          format: int32
          example: 46
          description: Capacidade de passageiros
        type:
          type: string
          example: "ônibus"
          description: Tipo de veículo (ônibus, micro-ônibus, van, etc.)
        price_cents:
          type: integer
          format: int64
          example: 320000
          description: Preço do frete em **centavos** (R$ 3.200,00 = 320000)
        tenant_id:
          type: integer
          format: int64
          example: 7
          description: ID da empresa de fretamento (tenant) proprietária do veículo
        tenant_name:
          type: string
          example: "Viação Paulista Ltda"
          description: Nome da empresa de fretamento

    SearchResponse:
      type: object
      description: Resultado de uma busca de disponibilidade.
      properties:
        search_db_id:
          type: string
          example: "srch_8f3a2b1c9d4e5f6a"
          description: Identificador único da busca
        status:
          type: string
          enum: [pending, complete, failed]
          example: "complete"
          description: |
            Status atual da busca:
            - `pending` — ainda processando (consulte novamente em ~2s)
            - `complete` — finalizada com sucesso
            - `failed` — falhou
        vehicles:
          type: array
          description: Veículos disponíveis (presente apenas quando `status` = `complete`)
          items:
            $ref: '#/components/schemas/VehicleResult'

    QuoteObject:
      type: object
      description: Representa um orçamento. Todos os valores monetários são inteiros em centavos.
      properties:
        id:
          type: integer
          format: int64
          example: 15
        customer_id:
          type: integer
          format: int64
          example: 42
        total:
          type: integer
          format: int64
          example: 368000
          description: Valor total do orçamento em **centavos** (inclui margem)
        margin_percentage:
          type: number
          format: double
          example: 15.0
          description: Margem percentual aplicada
        status:
          type: string
          enum: [draft, sent, accepted, rejected, expired]
          example: "sent"
          description: |
            Status do orçamento:
            - `draft` — rascunho
            - `sent` — enviado ao cliente
            - `accepted` — aceito
            - `rejected` — recusado
            - `expired` — expirado
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                format: int64
                example: 31
              vehicle_name:
                type: string
                example: "Mercedes-Benz O-500 Executivo"
              trip_type:
                type: string
                example: "onewaytrip"
              origin:
                type: string
                example: "Av. Paulista, 1578, São Paulo - SP"
              destination:
                type: string
                example: "Rua XV de Novembro, 1, Curitiba - PR"
              date:
                type: string
                format: date
                example: "2026-04-15"
              price_cents:
                type: integer
                format: int64
                example: 320000
                description: Preço base do fornecedor em centavos
              margin_value_cents:
                type: integer
                format: int64
                example: 48000
                description: Valor da margem em centavos
              total_cents:
                type: integer
                format: int64
                example: 368000
                description: Total do item (preço + margem) em centavos
        created_at:
          type: string
          format: date-time
          example: "2026-03-01T14:22:00-03:00"

    OrderObject:
      type: object
      description: Representa um pedido de fretamento. Todos os valores monetários são inteiros em centavos.
      properties:
        id:
          type: integer
          format: int64
          example: 88
        customer_id:
          type: integer
          format: int64
          example: 42
        total_amount:
          type: integer
          format: int64
          example: 368000
          description: Valor total do pedido em **centavos** (inclui margem)
        margin_value:
          type: integer
          format: int64
          example: 48000
          description: Valor total da margem em **centavos**
        status:
          type: string
          enum: [a_faturar, faturado, confirmado, em_execucao, concluido, cancelado]
          example: "confirmado"
          description: |
            Status do pedido:
            - `a_faturar` — aguardando faturamento
            - `faturado` — faturado
            - `confirmado` — confirmado e pago
            - `em_execucao` — viagem em andamento
            - `concluido` — serviço concluído
            - `cancelado` — cancelado
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                format: int64
                example: 77
              vehicle_name:
                type: string
                example: "Mercedes-Benz O-500 Executivo"
              trip_type:
                type: string
                example: "onewaytrip"
              origin_address:
                type: string
                example: "Av. Paulista, 1578, Bela Vista, São Paulo - SP"
              destination_address:
                type: string
                example: "Rua XV de Novembro, 1, Centro, Curitiba - PR"
              date:
                type: string
                format: date
                example: "2026-04-15"
              total_amount:
                type: integer
                format: int64
                example: 368000
                description: Valor do item em centavos
              status:
                type: string
                example: "programado"
        created_at:
          type: string
          format: date-time
          example: "2026-03-05T09:15:00-03:00"

    ServiceObject:
      type: object
      description: Representa um serviço operacional (item de pedido em execução).
      properties:
        id:
          type: integer
          format: int64
          example: 77
        uuid:
          type: string
          format: uuid
          example: "b9c8d7e6-f5a4-3210-9876-543210fedcba"
          description: Identificador único global para rastreamento cross-system (CGD / Central / Tenant)
        vehicle_name:
          type: string
          example: "Mercedes-Benz O-500 Executivo"
        status:
          type: string
          enum: [programado, confirmado, em_execucao, concluido, nao_executado]
          example: "confirmado"
          description: |
            Status operacional do serviço:
            - `programado` — agendado, aguardando confirmação
            - `confirmado` — confirmado pela viação
            - `em_execucao` — viagem em andamento
            - `concluido` — serviço concluído com sucesso
            - `nao_executado` — serviço não realizado
        start_date:
          type: string
          format: date-time
          example: "2026-04-15T07:30:00-03:00"
          description: Data/hora de início da viagem
        end_date:
          type: string
          format: date-time
          example: "2026-04-15T18:00:00-03:00"
          nullable: true
          description: Data/hora de término da viagem (estimada ou real)
        origin_address:
          type: string
          example: "Av. Paulista, 1578, Bela Vista, São Paulo - SP"
        destination_address:
          type: string
          example: "Rua XV de Novembro, 1, Centro, Curitiba - PR"
        total_amount:
          type: integer
          format: int64
          example: 368000
          description: Valor do serviço em **centavos**

    OperationalData:
      type: object
      description: Dados operacionais de um serviço (motoristas, passageiros, veículo, ANTT).
      properties:
        vehicle_plate:
          type: string
          example: "ABC-1D23"
          nullable: true
          description: Placa do veículo designado para o serviço
        antt:
          type: string
          example: "7654321-0"
          nullable: true
          description: Registro ANTT do veículo
        drivers:
          type: array
          nullable: true
          description: Motoristas designados para o serviço
          items:
            type: object
            properties:
              name:
                type: string
                example: "Carlos Roberto Mendes"
              document:
                type: string
                example: "987.654.321-00"
                description: CPF do motorista
              phone:
                type: string
                example: "(11) 98001-2345"
                nullable: true
              license:
                type: string
                example: "98765432100"
                description: Número da CNH
                nullable: true
              license_category:
                type: string
                example: "D"
                description: Categoria da CNH
                nullable: true
        passengers:
          type: array
          nullable: true
          description: Lista de passageiros embarcados/previstos
          items:
            type: object
            properties:
              name:
                type: string
                example: "Ana Paula Ferreira"
              document:
                type: string
                example: "111.222.333-44"
                nullable: true
                description: CPF ou RG do passageiro
              seat:
                type: string
                example: "01"
                nullable: true
                description: Número do assento

    WebhookObject:
      type: object
      description: Representa um webhook configurado para receber notificações de eventos.
      properties:
        id:
          type: integer
          format: int64
          example: 3
        url:
          type: string
          format: uri
          example: "https://erp.empresa.com.br/webhooks/gds"
          description: URL que recebe os eventos via POST
        events:
          type: array
          description: Lista de eventos monitorados por este webhook
          items:
            type: string
          example:
            - "order.created"
            - "order.status_changed"
            - "service.operational_updated"
        active:
          type: boolean
          example: true
          description: Indica se o webhook está ativo e recebendo eventos
        created_at:
          type: string
          format: date-time
          example: "2026-01-10T08:00:00-03:00"

    ErrorResponse:
      type: object
      description: Resposta de erro padrão da API.
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Recurso não encontrado"

    PaginationMeta:
      type: object
      description: Metadados de paginação retornados nas listagens.
      properties:
        current_page:
          type: integer
          format: int32
          example: 1
          description: Número da página atual
        last_page:
          type: integer
          format: int32
          example: 5
          description: Número da última página disponível
        per_page:
          type: integer
          format: int32
          example: 15
          description: Quantidade de itens por página
        total:
          type: integer
          format: int32
          example: 72
          description: Total de itens em todas as páginas

    StatsMeta:
      type: object
      description: Metadados de paginação com estatísticas financeiras consolidadas.
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            stats:
              type: object
              description: Estatísticas financeiras do período/filtro aplicado
              properties:
                total_revenue_cents:
                  type: integer
                  format: int64
                  example: 12540000
                  description: Receita total em **centavos** (R$ 125.400,00 = 12540000)
                total_margin_cents:
                  type: integer
                  format: int64
                  example: 1634000
                  description: Margem total em **centavos**
                average_margin_percentage:
                  type: number
                  format: double
                  example: 13.03
                  description: Margem média percentual
                total_orders:
                  type: integer
                  format: int32
                  example: 32
                  description: Total de pedidos no período/filtro
                total_services:
                  type: integer
                  format: int32
                  example: 41
                  description: Total de serviços no período/filtro
