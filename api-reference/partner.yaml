  /api/partner/v1/services/{id}/operational:
    get:
      tags:
        - Serviços
      summary: Dados operacionais do serviço
      description: |-
        Retorna os dados operacionais de um serviço, incluindo motoristas designados,
        lista de passageiros, placa do veículo e número ANTT.

        Estas informações são preenchidas pela empresa de fretamento (tenant) à medida
        que a operação avança, e chegam ao CGD via webhook.
      operationId: servicesOperational
      parameters:
        - name: id
          in: path
          description: ID do serviço
          required: true
          schema:
            type: integer
            format: int64
            example: 77
      responses:
        '200':
          description: Dados operacionais retornados com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/OperationalData'
              example:
                data:
                  vehicle_plate: "ABC-1D23"
                  antt: "7654321-0"
                  drivers:
                    - name: "Carlos Roberto Mendes"
                      document: "987.654.321-00"
                      phone: "(11) 98001-2345"
                      license: "98765432100"
                      license_category: "D"
                  passengers:
                    - name: "Ana Paula Ferreira"
                      document: "111.222.333-44"
                    - name: "Roberto Alves Costa"
                      document: "555.666.777-88"
        '404':
          description: Serviço não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Erro inesperado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /api/partner/v1/services/{id}/passengers:
    put:
      tags:
        - Serviços
      summary: Atualizar passageiros do serviço
      description: |-
        Atualiza a lista de passageiros de um serviço. A lista fornecida substitui
        completamente a lista anterior.

        Os dados são enviados à empresa de fretamento para fins de controle de embarque
        e documentação de viagem (exigência ANTT).
      operationId: servicesUpdatePassengers
      parameters:
        - name: id
          in: path
          description: ID do serviço
          required: true
          schema:
            type: integer
            format: int64
            example: 77
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - passengers
              properties:
                passengers:
                  type: array
                  minItems: 1
                  description: Lista completa de passageiros (substitui a lista atual)
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                        example: "Ana Paula Ferreira"
                        description: Nome completo do passageiro
                      document:
                        type: string
                        example: "111.222.333-44"
                        description: CPF ou RG do passageiro
                      seat:
                        type: string
                        example: "12A"
                        description: Número do assento (opcional)
            example:
              passengers:
                - name: "Ana Paula Ferreira"
                  document: "111.222.333-44"
                  seat: "01"
                - name: "Roberto Alves Costa"
                  document: "555.666.777-88"
                  seat: "02"
                - name: "Fernanda Lima Pinto"
                  document: "999.888.777-66"
                  seat: "03"
      responses:
        '200':
          description: Passageiros atualizados com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Passageiros atualizados com sucesso"
                  total_passengers:
                    type: integer
                    example: 3
        '404':
          description: Serviço não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Dados inválidos
          content:
            application/json:
