        '200':
          description: Serviço encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ServiceObject'
              example:
                data:
                  id: 77
                  uuid: "b9c8d7e6-f5a4-3210-9876-543210fedcba"
                  vehicle_name: "Mercedes-Benz O-500 Executivo"
