        Todos os valores (`total_amount`, `margin_value`, etc.) são inteiros em **centavos**.
      operationId: statementsIndex
      parameters:
        - name: customer_id
          in: query
          description: Filtra por ID do cliente
          required: false
          schema:
            type: integer
            format: int64
            example: 42
        - name: partner_company_id
          in: query
          description: Filtra por ID da empresa parceira (tenant)
          required: false
          schema:
            type: integer
            format: int64
            example: 7
        - name: date_from
          in: query
          description: Data inicial do extrato (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
            example: "2026-01-01"
        - name: date_to
          in: query
          description: Data final do extrato (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
            example: "2026-03-31"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            example: 1
      responses:
        '200':
          description: Extrato retornado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrderObject'
                  meta:
                    $ref: '#/components/schemas/StatsMeta'
              example:
                data:
                  - id: 88
                    customer_id: 42
                    total_amount: 368000
                    margin_value: 48000
                    status: "concluido"
                    created_at: "2026-03-05T09:15:00-03:00"
                    items: []
                  - id: 91
                    customer_id: 42
                    total_amount: 185000
                    margin_value: 22200
                    status: "concluido"
                    created_at: "2026-03-12T11:00:00-03:00"
                    items: []
                meta:
                  current_page: 1
                  last_page: 3
                  per_page: 15
                  total: 32
                  stats:
                    total_revenue_cents: 12540000
                    total_margin_cents: 1634000
                    average_margin_percentage: 13.03
                    total_orders: 32
                    total_services: 41
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Erro inesperado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

