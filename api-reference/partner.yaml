  # ─────────────────────────────────────────────
  # PEDIDOS
  # ─────────────────────────────────────────────

  /api/partner/v1/orders:
    get:
      tags:
        - Pedidos
      summary: Listar pedidos
      description: Retorna uma lista paginada de pedidos, com suporte a filtros por cliente, status e período.
      operationId: ordersIndex
      parameters:
        - name: customer_id
          in: query
          description: Filtra por ID do cliente
          required: false
          schema:
            type: integer
            format: int64
            example: 42
        - name: status
          in: query
          description: Filtra por status do pedido
          required: false
          schema:
            type: string
            enum: [a_faturar, faturado, confirmado, em_execucao, concluido, cancelado]
            example: "confirmado"
        - name: date_from
          in: query
          description: Data inicial do filtro (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
            example: "2026-01-01"
        - name: date_to
          in: query
          description: Data final do filtro (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
            example: "2026-03-31"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            example: 1
      responses:
        '200':
          description: Lista de pedidos retornada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrderObject'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Erro inesperado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

    post:
      tags:
        - Pedidos
      summary: Criar pedido
      description: |-
        Cria um novo pedido de fretamento. O pedido é enviado à Central Fretatech e em seguida
        ao tenant (empresa de fretamento) correspondente para processamento operacional.

        Pode ser criado a partir de um orçamento existente (via `quote_id`) ou diretamente
        com os dados dos itens de viagem.

        **Fluxo de status:** `A Faturar` → `Faturado` → `Confirmado` → `Em Execução` → `Concluído`
      operationId: ordersStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customer_id
                - items
              properties:
                customer_id:
                  type: integer
                  format: int64
                  example: 42
                  description: ID do cliente para o qual o pedido é criado
                quote_id:
                  type: integer
                  format: int64
                  example: 15
                  description: ID do orçamento de origem (opcional — quando informado, os itens do orçamento são aproveitados)
                items:
                  type: array
                  minItems: 1
                  description: Itens de viagem do pedido
                  items:
                    type: object
                    required:
                      - vehicle_id
                      - origin
                      - destination
                      - date
                      - trip_type
                    properties:
                      vehicle_id:
                        type: integer
                        format: int64
                        example: 101
                      origin:
                        type: object
                        description: Dados de origem da viagem
                        properties:
                          address:
                            type: string
                            example: "Av. Paulista, 1578, Bela Vista, São Paulo - SP"
                          lat:
                            type: number
                            format: double
                            example: -23.5613587
                          lng:
                            type: number
                            format: double
                            example: -46.6560878
                          city:
                            type: string
                            example: "São Paulo"
                          state:
                            type: string
                            example: "SP"
                      destination:
                        type: object
                        description: Dados de destino da viagem
                        properties:
                          address:
                            type: string
                            example: "Rua XV de Novembro, 1, Centro, Curitiba - PR"
                          lat:
                            type: number
                            format: double
                            example: -25.4284
                          lng:
                            type: number
                            format: double
                            example: -49.2733
                          city:
                            type: string
                            example: "Curitiba"
                          state:
                            type: string
                            example: "PR"
                      date:
                        type: string
                        format: date
                        example: "2026-04-15"
                      trip_type:
                        type: string
                        enum: [onewaytrip, roundtrip, hourtrip, customtrip]
                        example: "onewaytrip"
                      start_time:
                        type: string
                        example: "07:30"
                        description: Horário de embarque (HH:MM)
                      passengers:
                        type: integer
                        example: 42
                        description: Número de passageiros
                      margin_percentage:
                        type: number
                        format: double
                        example: 15.0
            example:
              customer_id: 42
              quote_id: 15
              items:
                - vehicle_id: 101
                  origin:
                    address: "Av. Paulista, 1578, Bela Vista, São Paulo - SP"
                    lat: -23.5613587
                    lng: -46.6560878
                    city: "São Paulo"
                    state: "SP"
                  destination:
                    address: "Rua XV de Novembro, 1, Centro, Curitiba - PR"
                    lat: -25.4284
                    lng: -49.2733
                    city: "Curitiba"
                    state: "PR"
                  date: "2026-04-15"
                  trip_type: "onewaytrip"
                  start_time: "07:30"
                  passengers: 42
                  margin_percentage: 15.0
      responses:
        '201':
          description: Pedido criado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Pedido criado com sucesso"
                  data:
                    $ref: '#/components/schemas/OrderObject'
        '422':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Erro inesperado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /api/partner/v1/orders/{id}:
    get:
      tags:
        - Pedidos
      summary: Ver pedido
      description: Retorna os dados completos de um pedido, incluindo itens, valores em centavos e status atual.
      operationId: ordersShow
